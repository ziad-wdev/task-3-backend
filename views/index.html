<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <form id="countryForm">
        <input type="text" name="country" id="countryInput" placeholder="Enter country"/>
        <input type="submit" id="countrySubmit" value="Search"></input>
      </form>
      <div id="countryResults">
        <div class="resultField"><p>country</p><p>{{name}}</p></div>
        <div class="resultField"><p>latitude</p><p>{{lat}}</p></div>
        <div class="resultField"><p>longtitude</p><p>{{lon}}</p></div>
        <div class="resultField"><p>tempreture</p><p>{{temp_c}}, {{temp_f}}</p></div>
      </div>
    </div>
  </body>
</html>
